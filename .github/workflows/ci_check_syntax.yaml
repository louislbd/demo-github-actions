name: 'Check Syntax'

on:
  pull_request:
    branches:
      - main

jobs:
  check_syntax:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Instal SQLFluff"
        run: pip install sqlfluff
      
      - name: "Check files"
        run: sqlfluff lint ./scripts --dialect postgres
